<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body class="newtab-page" data-has-wallpaper="false">
  <div class="corner-control" id="corner-control">
    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

    <div class="action-menu" id="action-menu" aria-labelledby="menu-trigger" aria-hidden="true" hidden>
      <button class="action-item" type="button" data-action="choose">
        <span class="action-content">
          <svg class="action-icon icon icon-tabler icons-tabler-outline icon-tabler-photo-edit" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path d="M15 8h.01" />
            <path d="M11 20h-4a3 3 0 0 1 -3 -3v-10a3 3 0 0 1 3 -3h10a3 3 0 0 1 3 3v4" />
            <path d="M4 15l4 -4c.928 -.893 2.072 -.893 3 0l3 3" />
            <path d="M14 14l1 -1c.31 -.298 .644 -.497 .987 -.596" />
            <path d="M18.42 15.61a2.1 2.1 0 0 1 2.97 2.97l-3.39 3.42h-3v-3l3.42 -3.39" />
          </svg>
          <span class="action-label" id="choose-wallpaper-label">Choose image</span>
        </span>
      </button>
      <button class="action-item action-item-danger" id="clear-wallpaper" type="button" data-action="clear">
        <span class="action-content">
          <svg class="action-icon icon icon-tabler icons-tabler-outline icon-tabler-trash" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path d="M4 7l16 0" />
            <path d="M10 11l0 6" />
            <path d="M14 11l0 6" />
            <path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12" />
            <path d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3" />
          </svg>
          <span class="action-label">Clear image</span>
        </span>
      </button>
    </div>

    <button
      class="control-trigger"
      id="menu-trigger"
      type="button"
      aria-label="Wallpaper settings"
      aria-haspopup="true"
      aria-expanded="false"
      aria-controls="action-menu"
    >
      <svg class="control-trigger-icon icon icon-tabler icons-tabler-outline icon-tabler-photo" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
        <path d="M15 8h.01" />
        <path d="M3 6a3 3 0 0 1 3 -3h12a3 3 0 0 1 3 3v12a3 3 0 0 1 -3 3h-12a3 3 0 0 1 -3 -3v-12" />
        <path d="M3 16l5 -5c.928 -.893 2.072 -.893 3 0l5 5" />
        <path d="M14 14l1 -1c.928 -.893 2.072 -.893 3 0l3 3" />
      </svg>
    </button>

    <input class="visually-hidden" id="wallpaper-input" type="file" accept="image/*" tabindex="-1">
  </div>
  <script src="newtab.js"></script>
</body>
</html>
